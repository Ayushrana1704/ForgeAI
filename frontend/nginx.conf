server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    # Prevent the page from being embedded in an iframe on another origin.
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Stop browsers from MIME-sniffing the response away from the declared type.
    add_header X-Content-Type-Options "nosniff" always;
    # Send the full origin on same-origin requests; strip the path for cross-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content Security Policy: allow resources only from the same origin.
    # 'unsafe-inline' is included for style-src because Tailwind CSS injects
    # inline styles at runtime.  Script execution remains restricted to 'self'.
    # Note: HSTS is intentionally omitted — TLS termination happens upstream.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
