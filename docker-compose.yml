services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forgeai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgeai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgeai}
      POSTGRES_DB: forgeai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeai -d forgeai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: forgeai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://forgeai:forgeai@postgres:5432/forgeai
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-secret-key-replace-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://frontend"]'

      # ───────── LLM Configuration ─────────
      LLM_PROVIDER: lmstudio
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_MODEL: qwen2.5-3b-instruct

    ports:
      - "8000:8000"
    volumes:
      # Hot-reload in development: mount source code
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (Vite dev server) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build   # stop after the build stage for dev; swap to 'production' for nginx
    container_name: forgeai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      BACKEND_URL: http://backend:8000

volumes:
  postgres_data: